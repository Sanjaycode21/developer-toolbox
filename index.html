<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productive Inspiration Board</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --text-color: #f8fafc;
      --accent-color: #6366f1;
      --font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-family);
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(to right, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .greeting {
      font-size: 1.2rem;
      color: #94a3b8;
    }

    main {
      width: 100%;
      max-width: 800px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Productive Inspiration</h1>
    <div class="greeting" id="greeting-text">Hello! Welcome to your space.</div>
  </header>
  <main>
    <!-- Future widgets and boards will be added here step-by-step -->
  </main>
</body>
</html>
