name: Daily App Builder Bot

on:
  schedule:
    # Run every day at 12:00 UTC (noon)
    - cron: '30 6 * * *'
  # Allow manual trigger from the GitHub repository actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-improve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so git commits and tracking work correctly
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Configure Git Bot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Daily Builder
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/daily-builder.js
